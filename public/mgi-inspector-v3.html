<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- 🚨 NUCLEAR CACHE DISABLE -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta http-equiv="Expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />

  <title>Meaning Graph Inspector</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #05060a;
      color: #f5f5f7;
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 320px;
      border-right: 1px solid #222;
      padding: 12px;
      box-sizing: border-box;
      background: #0b0d12;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 4px 0;
    }
    h2 {
      font-size: 14px;
      margin: 12px 0 4px 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
    }
    .status {
      font-size: 12px;
      color: #aaa;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      background: #111827;
      color: #e5e7eb;
      margin-right: 4px;
    }
    .pill.physiology { background: #1f2937; color: #93c5fd; }
    .pill.cognition { background: #1f2937; color: #fbbf24; }
    .pill.system { background: #1f2937; color: #a5b4fc; }

    #eventList {
      flex: 1;
      overflow-y: auto;
      border-radius: 6px;
      background: #05060a;
      border: 1px solid #111827;
      padding: 8px;
      font-size: 12px;
    }
    .event {
      padding: 6px 8px;
      border-radius: 4px;
      margin-bottom: 4px;
      background: #050814;
      border: 1px solid #111827;
      cursor: pointer;
    }
    .event:hover {
      border-color: #2563eb;
      background: #050a1a;
    }
    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }
    .event-type {
      font-weight: 600;
    }
    .event-domain {
      font-size: 11px;
      color: #9ca3af;
    }
    .event-payload {
      font-size: 11px;
      color: #d1d5db;
    }
    .event-id {
      font-size: 10px;
      color: #6b7280;
      margin-top: 2px;
    }

    #detail {
      flex: 1;
      border-radius: 6px;
      background: #05060a;
      border: 1px solid #111827;
      padding: 8px;
      font-size: 12px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    #graphHint {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div id="sidebar">
    <h1>Meaning Graph Inspector</h1>
    <div class="status" id="status">Connecting to /mgi/live…</div>

    <h2>Stream</h2>
    <div>
      <span class="pill system">system</span>
      <span class="pill physiology">physiology</span>
      <span class="pill cognition">cognition</span>
    </div>

    <h2>Events</h2>
    <div id="eventList"></div>
  </div>

  <div id="main">
    <h2>Event detail</h2>
    <div id="detail">Select an event on the left to inspect its full payload and causal links.</div>
    <div id="graphHint">
      This is the semantic substrate. Next step: render parent → child as a live graph.
    </div>
  </div>

  <!-- ⭐ Load the correct external JS file -->
  <script src="mgi-inspector-v3.js"></script>

</body>
</html>
